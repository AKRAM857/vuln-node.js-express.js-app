name: test
on:
  push:
    branches: main
  pull_request:
    branches: main
jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest,ubuntu-latest,windows-latest]
        node: [18,20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node}}
      - name: install dependecies
        run: npm install
      - name: run lint
        run: npm run lint
