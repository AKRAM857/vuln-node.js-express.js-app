name: test
on:
  push:
    branches: main
  pull_request:
    branches: main
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: run normal test
    steps:
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
      - uses: actions/checkout@v4.2.2
      - name: install dependecies
        run: npm clean-install --no-fund
      - name: run test
        run: npm run test
